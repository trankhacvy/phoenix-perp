name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: phoenix_perp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint & format check
        run: npm run check

      - name: Type check + build
        run: npm run build

      - name: Run tests
        run: npm run test:coverage
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/phoenix_perp_test
          REDIS_URL: redis://localhost:6379
          TELEGRAM_BOT_TOKEN: test_token
          PRIVY_APP_ID: test_app_id
          PRIVY_APP_SECRET: test_app_secret
          BUILDER_AUTHORITY_PUBKEY: 11111111111111111111111111111111
          BUILDER_ACCESS_CODE: test_code
          HELIUS_RPC_URL: https://mainnet.helius-rpc.com/?api-key=test
